    <rect x="-60" y="40" width="60" height="12" rx="6" fill="#1a1a2e" opacity="0.2"/>
    <!-- Галочка -->
    <circle cx="60" cy="-100" r="40" fill="#10b981"/>
    <path d="M45,-110 L55,-95 L75,-115" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
