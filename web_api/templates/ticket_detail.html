<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка #{{ ticket_number }} — ГКУ ОП Заявки</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/main.css?v={{ static_version }}">
    <script src="/static/js/auth.js?v={{ static_version }}"></script>

</head>
<body>
    <!-- Оверлей авторизации -->
    <div class="auth-overlay" id="authOverlay">
        <form class="auth-form" id="authForm" onsubmit="return handleLogin(event)">
            <input type="text" class="auth-input" id="authLogin" placeholder="Логин" autocomplete="off" />
            <input type="password" class="auth-input" id="authPassword" placeholder="Пароль" autocomplete="off" />
            <button type="submit" class="auth-btn">Войти</button>
            <div class="auth-error" id="authError"></div>
        </form>
    </div>

    <div class="header">
        <div class="header-inner">
            <div class="header-left">
                <h1 class="header-title">Заявка #{{ ticket_number }}{% if comment_count and comment_count > 0 %}<span class="comment-icon-header" onclick="document.getElementById('user-comments-section').scrollIntoView({behavior:'smooth'});return false;" title="Комментарии ({{ comment_count }})">💬 <span class="comment-count-badge">{{ comment_count }}</span></span>{% endif %}</h1>
            </div>
            <div id="authIndicator" class="header-right" style="display:none"></div>
        </div>
    </div>

    <div class="container">
        <!-- Контейнер для тостов -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- Оверлей загрузки -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">Обновление данных…</div>
        </div>

        <div id="content">
            <div class="loading">Загрузка...</div>
        </div>
    </div>

    <script>
        const ticketNumber = {{ ticket_number | tojson }};

        // ─── Аутентификация ───────────────────────────────────
        const AUTH_KEY = 'gkuop_auth';

        // Глобальные переменные состояния заявки (устанавливаются в loadTicket)
        let s = null;   // актуальное состояние заявки (с учётом истории)
        let data = null; // полные данные загрузки (ticket, history, images, etc.)

        // ─── Индикатор загрузки ──────────────────────────────
        let _isLoading = false;

        function showLoading(text) {
            if (_isLoading) return;
            _isLoading = true;
            const overlay = document.getElementById('loadingOverlay');
            const textEl = document.getElementById('loadingText');
            if (textEl && text) textEl.textContent = text;
            if (overlay) overlay.classList.add('active');
        }

        function hideLoading() {
            _isLoading = false;
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.remove('active');
        }

        // Безопасный fetch с проверкой response.ok и диагностикой ошибок JSON
        async function fetchJSON(url, options = {}) {
            // Добавляем заголовок Authorization из auth.js, если доступен
            const headers = { ...(options.headers || {}) };
            if (typeof AUTH !== 'undefined' && AUTH.getToken()) {
                headers['Authorization'] = `Bearer ${AUTH.getToken()}`;
            }
            options.headers = headers;
            const r = await fetch(url, options);
            if (!r.ok) {
                // Пытаемся извлечь человекочитаемое сообщение из JSON-ответа
                try {
                    const errorData = await r.json();
                    const userMessage = errorData.message || errorData.error || null;
                    if (userMessage) {
                        throw new Error(userMessage);
                    }
                } catch (parseErr) {
                    // Если это уже наша ошибка с сообщением — пробрасываем дальше
                    if (parseErr instanceof Error && parseErr.message !== '') {
                        throw parseErr;
                    }
                }
                // Если не удалось распарсить JSON или нет message — fallback
                const text = await r.text();
                const preview = text.slice(0, 200);
                throw new Error(`HTTP ${r.status}: ${preview}`);
            }
            // Проверяем Content-Type перед парсингом JSON
            const contentType = r.headers.get('content-type') || '';
            if (!contentType.includes('application/json') && !contentType.includes('application/problem+json')) {
                const text = await r.text();
                const preview = text.slice(0, 200);
                throw new Error(`Неожиданный Content-Type: ${contentType}. Ответ: ${preview}`);
            }
            try {
                return await r.json();
            } catch (e) {
                const text = await r.text();
                const preview = text.slice(0, 200);
                throw new Error(`Ошибка парсинга JSON: ${e.message}. Ответ: ${preview}`);
            }
        }

        function getAuth() {
            try {
                const raw = sessionStorage.getItem(AUTH_KEY);
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (Date.now() - data.timestamp > 24 * 60 * 60 * 1000) {
                    sessionStorage.removeItem(AUTH_KEY);
                    return null;
                }
                return data;
            } catch (e) {
                return null;
            }
        }

        function setAuth(username) {
            sessionStorage.setItem(AUTH_KEY, JSON.stringify({
                username: username,
                timestamp: Date.now()
            }));
        }

        function clearAuth() {
            sessionStorage.removeItem(AUTH_KEY);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const login = document.getElementById('authLogin').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const errorEl = document.getElementById('authError');

            try {
                // Используем новый механизм аутентификации из auth.js
                if (typeof AUTH !== 'undefined' && typeof AUTH.login === 'function') {
                    const result = await AUTH.login(login, password);
                    if (result.success) {
                        setAuth(result.user.username);
                        showApp();
                        errorEl.textContent = '';
                        // Инициализируем PermissionGuard (применяет защиту + MutationObserver)
                        if (typeof PermissionGuard !== 'undefined') {
                            PermissionGuard.init();
                        } else {
                            setTimeout(applyPermissionUI, 100);
                        }
                    } else {
                        errorEl.textContent = result.error || 'Неверный логин или пароль';
                    }
                } else {
                    // Fallback на новый API аутентификации
                    const data = await fetchJSON('/api/auth/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username: login, password})
                    });
                    if (data.status === 'ok') {
                        // Сохраняем токен, если он есть
                        if (data.token) {
                            try {
                                sessionStorage.setItem('gkuop_auth_v2', JSON.stringify({
                                    user: data.user,
                                    token: data.token,
                                    permissions: data.permissions || [],
                                    timestamp: Date.now()
                                }));
                            } catch (e) { /* ignore */ }
                        }
                        setAuth(data.username);
                        showApp();
                        errorEl.textContent = '';
                    } else {
                        errorEl.textContent = data.message || 'Неверный логин или пароль';
                    }
                }
            } catch (e) {
                errorEl.textContent = 'Ошибка соединения с сервером';
            }
            return false;
        }

        function handleLogout() {
            clearAuth();
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('authIndicator').style.display = 'none';
            document.getElementById('authLogin').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authError').textContent = '';
        }

        function showApp() {
            document.getElementById('authOverlay').style.display = 'none';
            const indicator = document.getElementById('authIndicator');
            const auth = getAuth();
            if (auth) {
                indicator.style.display = 'flex';
                indicator.textContent = '';
                const wrapper = document.createElement('span');
                wrapper.className = 'auth-indicator';
                const dot = document.createElement('span');
                dot.className = 'auth-dot';
                wrapper.appendChild(dot);
                wrapper.appendChild(document.createTextNode(auth.username || ''));
                indicator.appendChild(wrapper);
            }
        }

        // Проверяем авторизацию при загрузке
        const auth = getAuth();
        if (auth) {
            showApp();
        }

        // ─── Гамбургер-меню + закрытие по клику вне ────────
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.hamburger-btn');
            if (btn) {
                e.stopPropagation();
                const wrap = btn.closest('.hamburger-wrap');
                if (!wrap) return;
                const menu = wrap.querySelector('.dropdown-menu');
                if (!menu) return;
                // Закрываем все другие открытые дропдауны
                document.querySelectorAll('.dropdown-menu.show').forEach(m => {
                    if (m !== menu) m.classList.remove('show');
                });
                menu.classList.toggle('show');
            } else {
                // Клик вне дропдауна — закрываем все
                document.querySelectorAll('.dropdown-menu.show').forEach(function(menu) {
                    if (!menu.contains(e.target)) {
                        menu.classList.remove('show');
                    }
                });
            }
        });

        // ─── Навигация назад к списку ───────────────────────
        function goBackToList() {
            // Просто возвращаемся назад через history API
            // Если нет истории в сессии — переходим на главную
            if (window.history.length > 1) {
                history.back();
            } else {
                window.location.href = '/';
            }
        }

        // ─── Toast-уведомления ──────────────────────────────
        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toastContainer');
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
                <span class="toast-msg">${escapeHtml(message)}</span>
                <button class="toast-close" onclick="this.closest('.toast').classList.add('removing');setTimeout(()=>this.closest('.toast').remove(),300)">✕</button>
            `;
            container.appendChild(toast);
            if (duration > 0) {
                setTimeout(() => {
                    toast.classList.add('removing');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }
        }

        // ─── Модальное окно ─────────────────────────────────
        function showModal(title, message, confirmText = 'Да', cancelText = 'Отмена') {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal">
                        <h3>${escapeHtml(title)}</h3>
                        <p>${escapeHtml(message)}</p>
                        <div class="modal-actions">
                            <button class="btn btn-ghost">${escapeHtml(cancelText)}</button>
                            <button class="btn btn-primary">${escapeHtml(confirmText)}</button>
                        </div>
                    </div>
                `;
                overlay.querySelector('.btn-ghost').onclick = () => {
                    overlay.remove();
                    resolve(false);
                };
                overlay.querySelector('.btn-primary').onclick = () => {
                    overlay.remove();
                    resolve(true);
                };
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.remove();
                        resolve(false);
                    }
                });
                document.body.appendChild(overlay);
            });
        }

        function statusClass(status) {
            if (!status) return 'status-default';
            const s = status.toLowerCase();
            if (s.includes('отклон') || s.includes('закрыт')) return 'status-rejected';
            if (s.includes('комплектующ')) return 'status-parts';
            if (s.includes('выполн')) return 'status-completed';
            if (s.includes('соглас') || s.includes('решен')) return 'status-approved';
            if (s.includes('работ')) return 'status-work';
            if (s.includes('нов') || s.includes('созд')) return 'status-new';
            return 'status-default';
        }

        // Флаг для принудительного обновления списка при возврате
        function markListNeedsRefresh() {
            try { sessionStorage.setItem('gkuop_list_needs_refresh', '1'); } catch (_) {}
        }

        // ─── Защищённые функции (с проверкой прав через PermissionGuard) ──
        // Оригинальные функции
        async function _completeTicket() {
            // Проверка: если заявка уже выполнена — блокируем на клиенте
            if (s && s.status === 'Выполнено' && data && data.completed_at) {
                showToast('⚠️ Заявка уже выполнена', 'warning');
                return;
            }
            const confirmed = await showModal('Выполнение заявки', 'Отметить заявку как выполненную?');
            if (!confirmed) return;
            try {
                const result = await fetchJSON(`/api/tickets/${ticketNumber}/complete`, { method: 'POST' });
                if (result.error) {
                    if (result.code === 'ALREADY_COMPLETED') {
                        showToast('⚠️ Заявка уже выполнена', 'warning');
                    } else {
                        showToast('Ошибка: ' + result.error, 'error');
                    }
                    return;
                }
                showToast('✓ Заявка отмечена как выполненная', 'success');
                markListNeedsRefresh();
                try { localStorage.setItem('gkuop_task_update', Date.now().toString()); } catch (_) {}
                loadTicket();
            } catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
        }
        const completeTicket = PermissionGuard.protectFunction(_completeTicket, 'complete_tickets');

        // ─── Отмена выполнения заявки (только admin) ────────────────
        async function _uncompleteTicket() {
            const confirmed = await showModal('Отмена выполнения', 'Вы уверены, что хотите отменить выполнение заявки?');
            if (!confirmed) return;
            try {
                const result = await fetchJSON(`/api/tickets/${ticketNumber}/uncomplete`, { method: 'POST' });
                if (result.error) {
                    showToast('Ошибка: ' + result.error, 'error');
                    return;
                }
                showToast('✓ Выполнение заявки отменено', 'success');
                markListNeedsRefresh();
                try { localStorage.setItem('gkuop_task_update', Date.now().toString()); } catch (_) {}
                loadTicket();
            } catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
        }
        const uncompleteTicket = PermissionGuard.protectFunction(_uncompleteTicket, 'admin_access');

        /**
         * Переключает статус задачи (добавить/удалить) асинхронно,
         * без полной перезагрузки страницы. Точечно обновляет кнопку.
         */
        async function _toggleTask() {
            const btn = document.querySelector('.btn-task');
            if (!btn) return;

            // Определяем текущее состояние по кнопке (не по серверу — экономим запрос)
            const isCurrentlyTask = btn.classList.contains('active');

            // Блокируем кнопку и показываем спиннер
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-btn"></span>';
            btn.classList.add('loading');

            // Создаём контроллер для таймаута
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s таймаут

            try {
                let data;
                if (isCurrentlyTask) {
                    data = await fetchJSON(`/api/tickets/${ticketNumber}/task`, {
                        method: 'DELETE',
                        signal: controller.signal,
                    });
                } else {
                    data = await fetchJSON(`/api/tickets/${ticketNumber}/task`, {
                        method: 'POST',
                        signal: controller.signal,
                    });
                }

                clearTimeout(timeoutId);

                if (data.error) {
                    showToast('Ошибка: ' + data.error, 'error');
                    // Восстанавливаем исходное состояние кнопки
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    return;
                }

                // Обработка дубликата (409 Conflict)
                if (data.status === 'duplicate') {
                    showToast(data.message || 'Заявка уже в задачах', 'warning');
                    // Синхронизируем состояние: помечаем как задачу
                    if (s) s._is_task = true;
                    btn.classList.add('active');
                    btn.innerHTML = '✅ Задача';
                    btn.disabled = false;
                    btn.classList.remove('loading');
                    markListNeedsRefresh();
                    return;
                }

                // Успешное переключение — точечно обновляем кнопку
                const newIsTask = data.is_task === true;
                if (s) s._is_task = newIsTask;

                if (newIsTask) {
                    btn.classList.add('active');
                    btn.innerHTML = '✅ Задача';
                    showToast('🔵 Заявка добавлена в задачи', 'success');
                } else {
                    btn.classList.remove('active');
                    btn.innerHTML = '🔵 Задача';
                    showToast('Заявка удалена из задач', 'info');
                }

                btn.disabled = false;
                btn.classList.remove('loading');

                // Анимация успешного обновления
                btn.classList.add('btn-flash');
                setTimeout(() => btn.classList.remove('btn-flash'), 600);

                // Отмечаем, что список на главной нужно обновить
                markListNeedsRefresh();

            } catch (e) {
                clearTimeout(timeoutId);
                // Восстанавливаем кнопку
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                btn.classList.remove('loading');

                if (e.name === 'AbortError') {
                    showToast('⏱ Превышено время ожидания. Попробуйте снова.', 'error');
                } else {
                    showToast('Ошибка: ' + e.message, 'error');
                }
            }
        }
        const toggleTask = PermissionGuard.protectFunction(_toggleTask, 'manage_tasks');

        async function _archiveTicket() {
            const confirmed = await showModal('Архивирование', 'Отправить заявку в архив?');
            if (!confirmed) return;
            try {
                const data = await fetchJSON(`/api/tickets/${ticketNumber}/archive`, { method: 'POST' });
                if (data.error) { showToast('Ошибка: ' + data.error, 'error'); return; }
                showToast('📦 Заявка отправлена в архив', 'success');
                markListNeedsRefresh();
                loadTicket();
            } catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
        }
        const archiveTicket = PermissionGuard.protectFunction(_archiveTicket, 'archive_tickets');

        async function _restoreTicket() {
            const confirmed = await showModal('Восстановление', 'Восстановить заявку из архива?');
            if (!confirmed) return;
            try {
                const data = await fetchJSON(`/api/tickets/${ticketNumber}/restore`, { method: 'POST' });
                if (data.error) { showToast('Ошибка: ' + data.error, 'error'); return; }
                showToast('↩ Заявка восстановлена из архива', 'success');
                markListNeedsRefresh();
                loadTicket();
            } catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
        }
        const restoreTicket = PermissionGuard.protectFunction(_restoreTicket, 'archive_tickets');

        const fieldLabels = {
            'subject': 'Тема',
            'inventory_number': 'Инв. номер',
            'printer_model': 'Оборудование',
            'office': 'Офис',
            'cabinet': 'Кабинет',
            'component': 'Комплектующее',
            'status': 'Статус',
            'priority': 'Приоритет',
            'assigned_to': 'Назначена',
            'author_name': 'Автор',
            'contact_phone': 'Телефон',
            'department': 'Подразделение',
            'position': 'Должность',
            'current_note': 'Примечание',
            'required_action': 'Требуется',
            'cause': 'Причина обращения',
            'fault_description': 'Описание неисправности',
            'work_done': 'Проведены работы',
            'tech_conclusion': 'Тех. вывод',
            'soglasovano_line': 'Согласование',
        };

        function fieldLabel(key) {
            return fieldLabels[key] || key;
        }

        function escapeHtml(text) {
            if (text == null) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function displayValue(value) {
            const text = value == null ? '' : String(value).trim();
            return text ? escapeHtml(text) : '—';
        }

        function parseSoglasovanieRows(value) {
            if (!value) return [];
            const wrapper = document.createElement('div');
            wrapper.innerHTML = String(value)
                .replace(/<\s*br\s*\/?\s*>/gi, '\n')
                .replace(/<\/\s*(div|p|li|tr)\s*>/gi, '\n');
            const text = (wrapper.textContent || wrapper.innerText || String(value))
                .replace(/\u00a0/g, ' ')
                .replace(/\r\n?/g, '\n');
            const lineRows = text
                .split(/\n/)
                .map(line => line.trim())
                .filter(Boolean)
                .map(line => {
                    const statusMatches = line.match(/СОГЛАСОВАНО/gi) || [];
                    if (statusMatches.length !== 1) return null;
                    const match = line.match(/^(\d+)\s*(?:[-–—]|\s+)\s*(.*?)\s*(?:[-–—=])\s*(СОГЛАСОВАНО.*)$/i);
                    if (!match) return null;
                    return {
                        number: match[1],
                        title: match[2].replace(/\s+/g, ' ').trim(),
                        status: match[3].trim()
                    };
                })
                .filter(Boolean);
            if (lineRows.length > 0) {
                return lineRows;
            }

            const structuredMatches = [...text.matchAll(/(?<!\d)(\d+)\s*(?:[-–—]|\s{2,})\s*(.*?)\s*(?:[-–—=])\s*(СОГЛАСОВАНО)/gi)];
            if (structuredMatches.length > 0) {
                return structuredMatches
                    .map(match => ({
                        number: match[1],
                        title: match[2].replace(/\s+/g, ' ').trim(),
                        status: match[3].trim()
                    }))
                    .filter(row => row.title);
            }

            return text
                .split(/\r?\n/)
                .map(line => line.trim())
                .filter(Boolean)
                .map(line => {
                    const match = line.match(/^(\d+)\s*(?:[-–—]|\s+)\s*(.*?)\s*(?:[-–—=])\s*(СОГЛАСОВАНО.*)$/i);
                    if (!match) {
                        return { number: '', title: line, status: '' };
                    }
                    return {
                        number: match[1],
                        title: match[2].trim(),
                        status: match[3].trim()
                    };
                });
        }

        function renderSoglasovanie(value) {
            const rows = parseSoglasovanieRows(value);
            if (!rows.length) return '';

            const hasStructuredRows = rows.some(row => row.number || row.status);
            if (!hasStructuredRows) {
                return `<span class="soglasovano-line">${escapeHtml(value).replace(/\n/g, '<br>')}</span>`;
            }

            const tableRows = rows.map(row => `
                <tr>                    
                    <td><span class="status-approved">${escapeHtml(row.number || '—')}</td>
                    <td><span class="status-approved">${escapeHtml(row.title || '—')}</td>
                    
                </tr>
            `).join('');

            return `<table class="soglasovanie-table">
                <tbody>${tableRows}</tbody>
            </table>`;
        }

        function formatDate(d) {
            if (!d) return '—';
            const dt = new Date(d);
            return dt.toLocaleDateString('ru-RU', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        async function loadTicket() {
            showLoading('Загрузка заявки…');
            try {
                const [responseData, taskData] = await Promise.all([
                    fetchJSON(`/api/tickets/${ticketNumber}`),
                    fetchJSON(`/api/tickets/${ticketNumber}/task`).catch(() => ({ is_task: false }))

                        `<div class="error">${escapeHtml(responseData.error)}</div>`;

                // Собираем актуальное состояние заявки из тикета + всех diff-записей истории

                const _fieldsFromTicket = new Set(['status', 'assigned_to', 'priority', 'office', 'cabinet',
                    'required_action', 'cause', 'fault_description', 'work_done', 'tech_conclusion',
                    'inventory_number', 'department', 'contact_phone', 'author_name', 'position']);
                s = { ...t, _is_task: taskData.is_task === true };
                const snapshots = history.filter(h => h.type === 'snapshot');
                for (const snap of snapshots) {
                    if (snap.changed_fields && typeof snap.changed_fields === 'object') {
                        // Применяем только те поля из changed_fields, которых нет в tickets,
                        // чтобы не перезаписать актуальное состояние устаревшими данными
                        for (const [key, value] of Object.entries(snap.changed_fields)) {
                            if (!_fieldsFromTicket.has(key)) {
                                s[key] = value;
                            }
                        }
                    }
                }

                let html = '';
                const ticketNumberSafe = displayValue(t.ticket_number);
                const statusSafe = displayValue(s.status);

                // Кнопки действий
                const isArchived = t.is_archived === true;
                html += `<div class="action-buttons">`;
                // При возврате к списку используем history.back() если есть сохранённое состояние,
                // иначе переходим на главную. Это позволяет восстановить позицию прокрутки и фильтры.
                html += `<a href="/" class="btn btn-action btn-back" onclick="event.preventDefault(); goBackToList()">＜ Назад</a>`;
                // Группа кнопок, прижатая к правому краю
                html += `<div class="action-buttons-right">`;
                if (!isArchived) {
                    // Кнопка "Задача 🔵" — показываем всегда, кроме случаев когда заявка уже назначена
                    const assignedTo = (s.assigned_to || '').trim();
                    if (!assignedTo) {
                        const isTask = s._is_task === true;
                        html += `<button class="btn btn-action btn-task ${isTask ? 'active' : ''}" data-permission="manage_tasks" onclick="toggleTask()">${isTask ? '✅ Задача' : '🔵 Задача'}</button>`;
                    }
                    // Скрываем кнопку "Выполнено" для уже выполненных заявок
                    if (s.status === 'Выполнено' && data.completed_at) {

                    } else {
                        html += `<button class="btn btn-action btn-complete" data-permission="complete_tickets" onclick="completeTicket()">✓ Выполнено</button>`;
                    }
                    // Гамбургер-меню (мобильное) — скрытые в нём кнопки
                    html += `<div class="hamburger-wrap">
                        <button class="hamburger-btn" aria-label="Дополнительные действия">☰</button>
                        <div class="dropdown-menu">
                            <button class="dropdown-item dropdown-item-danger" data-permission="admin_access" onclick="uncompleteTicket()">↩ Отменить выполнение</button>
                            <button class="dropdown-item dropdown-item-warning" data-permission="archive_tickets" onclick="archiveTicket()">📦 В архив</button>
                        </div>
                    </div>`;
                } else {
                    html += `<button class="btn btn-action btn-restore" data-permission="archive_tickets" onclick="restoreTicket()">↩ Восстановить</button>`;
                }
                html += `</div>`;
                html += `</div>`;

                // Основная информация
                html += `<div class="card">
                    <h2>Основная информация</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Номер заявки</div>
                            <div class="value">#${ticketNumberSafe}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Статус</div>
                            <div class="value"><span class="status-badge ${statusClass(s.status)}">${statusSafe}${s.status && statusClass(s.status) === 'status-completed' && data.completed_at ? `<br><span class="completed-date">${formatDate(data.completed_at)}</span>` : ''}</span></div>
                        </div>
                        ${s.soglasovano_line ? `<div class="info-item" style="grid-column: 1 / -1;">
                            <div class="label">Согласование</div>
                            <div class="value">${renderSoglasovanie(s.soglasovano_line)}</div>
                        </div>` : ''}
                        <div class="info-item">
                            <div class="label">Требуется</div>
                            <div class="value">${displayValue(s.required_action)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Причина обращения</div>
                            <div class="value">${displayValue(s.cause)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Описание неисправности</div>
                            <div class="value">${displayValue(s.fault_description)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Проведены работы</div>
                            <div class="value">${displayValue(s.work_done)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Тех. вывод</div>
                            <div class="value">${displayValue(s.tech_conclusion)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Дата создания</div>
                            <div class="value">${formatDate(t.first_received_date)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Последнее обновление</div>
                            <div class="value">${formatDate(t.last_updated_date)}</div>
                        </div>
                    </div>
                </div>`;

                // Оборудование
                html += `<div class="card">
                    <h2>Оборудование</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Инвентарный номер</div>
                            <div class="value">${displayValue(s.inventory_number)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Оборудование</div>
                            <div class="value">${displayValue(s.printer_model)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Комплектующее</div>
                            <div class="value">${displayValue(s.component)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Офис</div>
                            <div class="value">${displayValue(s.office)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Кабинет</div>
                            <div class="value">${displayValue(s.cabinet)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Подразделение</div>
                            <div class="value">${displayValue(s.department)}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Примечание</div>
                            <div class="value">${displayValue(s.current_note)}</div>
                        </div>
                    </div>
                </div>`;

                // Изображения и документы
                const images = data.images || [];
                html += `<div class="card">
                    <h2>Файлы (${images.length})</h2>`;

                if (images.length > 0) {
                    html += `<div class="images-grid">`;
                    for (let idx = 0; idx < images.length; idx++) {
                        const img = images[idx];
                        const thumbUrl = img.thumbnail_url || img.download_url;
                        const mime = img.mime_type || '';
                        const ext = img.original_filename ? '.' + img.original_filename.split('.').pop().toLowerCase() : '';
                        const isImage = mime.startsWith('image/');
                        const isPdf = mime === 'application/pdf' || ext === '.pdf';
                        const typeClass = isImage ? 'file-type-img' :
                            ext === '.pdf' ? 'file-type-pdf' :
                            ext === '.docx' ? 'file-type-docx' :
                            ext === '.xlsx' ? 'file-type-xlsx' :
                            ext === '.txt' ? 'file-type-txt' : '';
                        const typeLabel = isImage ? 'IMG' :
                            ext === '.pdf' ? 'PDF' :
                            ext === '.docx' ? 'DOCX' :
                            ext === '.xlsx' ? 'XLSX' :
                            ext === '.txt' ? 'TXT' : 'FILE';
                        const previewAlt = escapeHtml(img.original_filename || 'Файл');

                        html += `<div class="image-card" data-index="${idx}">
                            <div class="preview-wrap" onclick="openLightbox(${idx})">
                                ${thumbUrl ? `<img src="${thumbUrl}" alt="${previewAlt}" loading="lazy" class="${isImage ? '' : 'contain'}"
                                    onerror="this.style.display='none'; this.parentElement.querySelector('.doc-icon-fallback').style.display='flex';">` : ''}
                                <div class="doc-icon doc-icon-fallback" style="${thumbUrl ? 'display:none' : 'display:flex'}">${isPdf ? 'PDF' : '📄'}</div>
                            </div>
                            <button class="delete-btn" data-permission="delete_images" onclick="deleteImage(${img.id})" title="Удалить">✕</button>
                            <div class="image-info">
                                <div class="filename" title="${previewAlt}">${previewAlt}</div>
                                <div class="file-meta">
                                    <span class="file-type-badge ${typeClass}">${typeLabel}</span>
                                    <span>${(img.file_size / 1024).toFixed(1)} КБ</span>
                                </div>
                            </div>
                        </div>`;
                    }
                    html += `</div>`;
                } else {
                    html += `<div style="color: var(--color-text-muted); font-size: var(--font-size-base);">Нет прикреплённых файлов</div>`;
                }

                // Форма загрузки (только для upload_images)
                if (!isArchived) {
                    html += `<div class="upload-area" id="uploadArea" data-permission="upload_images"
                        onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput"
                            accept="image/jpeg,image/png,image/gif,application/pdf,.docx,.xlsx,text/plain,.txt"
                            multiple onchange="handleFiles(this.files)">
                        <div class="upload-label">📁 <strong>Загрузить файлы</strong><br>JPEG, PNG, GIF, PDF, DOCX, XLSX, TXT до 10 МБ</div>
                        <div class="upload-hint">или перетащите файлы в эту область</div>
                        <div class="upload-progress" id="uploadProgress"></div>
                    </div>`;
                }

                html += `</div>`;

                // Комментарии пользователей
                const userComments = data.user_comments || [];
                html += `<div class="card" id="user-comments-section">
                    <h2>Комментарии (${userComments.length})</h2>`;

                if (userComments.length === 0) {
                    html += '<div style="color: var(--color-text-muted); font-size: var(--font-size-base); margin-bottom: var(--space-4);">Комментариев пока нет</div>';
                } else {
                    html += `<div class="comments-list">`;
                    for (const c of userComments) {
                        html += `<div class="comment-item">
                            <div class="comment-header">
                                <span class="comment-author">${escapeHtml(c.author_name)}</span>
                                <span class="comment-date">${formatDate(c.created_at)}</span>
                            </div>
                            <div class="comment-body">${escapeHtml(c.comment_text)}</div>
                        </div>`;
                    }
                    html += `</div>`;
                }

                // Форма добавления комментария (только для авторизованных с правом add_comments)
                const authData = getAuth();
                if (authData) {
                    html += `<div class="comment-form" data-permission="add_comments">
                        <textarea class="comment-input" id="commentInput" placeholder="Напишите комментарий..." rows="3" maxlength="5000"></textarea>
                        <div class="comment-form-actions">
                            <span class="comment-char-counter"><span id="commentCharCount">0</span>/5000</span>
                            <button class="btn btn-primary btn-sm" onclick="submitComment()">Отправить</button>
                        </div>
                        <div class="comment-error" id="commentError"></div>
                    </div>`;
                }

                html += `</div>`;

                // История изменений
                html += `<div class="card">
                    <h2>История изменений (${history.length})</h2>`;

                if (history.length === 0) {
                    html += '<div style="color: var(--color-text-muted); font-size: var(--font-size-base);">История пуста</div>';
                } else {
                    history.forEach((h, idx) => {
                        const isSnapshot = h.type === 'snapshot';
                        html += `<div class="history-item">
                            <div class="date">
                                <span class="dot"></span>
                                ${formatDate(h.date)}`;

                        if (isSnapshot) {
                            html += ` <span style="font-size:var(--font-size-xs);color:var(--color-text-secondary);">(письмо №${idx + 1})</span>`;
                        }

                        html += `</div>`;

                        const skipFields = ['assigned_to', 'contact_phone', 'author_name', 'position', 'subject'];
                        if (isSnapshot) {
                            const changes = h.changed_fields || {};
                            const changeEntries = Object.entries(changes).filter(([k, v]) => v && !skipFields.includes(k));
                            if (changeEntries.length > 0) {
                                html += `<div class="changes">`;
                                for (const [key, val] of changeEntries) {
                                    html += `<span class="change-tag">${escapeHtml(fieldLabel(key))}: ${displayValue(val)}</span>`;
                                }
                                html += `</div>`;
                            } else {
                                html += `<div style="color: var(--color-text-muted); font-size: var(--font-size-sm); margin-top: var(--space-1);">Нет изменений</div>`;
                            }
                        } else {
                            if (h.status_before || h.status_after) {
                                const statusBefore = displayValue(h.status_before);
                                const statusAfter = displayValue(h.status_after);
                                html += `<div style="margin-top:var(--space-1);font-size:var(--font-size-sm);">
                                    Статус: <span class="status-badge ${statusClass(h.status_before)}">${statusBefore}</span>
                                    → <span class="status-badge ${statusClass(h.status_after)}">${statusAfter}</span>
                                </div>`;
                            }
                            if (h.comment) {
                                html += `<div class="comment">${escapeHtml(h.comment)}</div>`;
                            }
                            if (h.changes && typeof h.changes === 'object') {
                                html += `<div class="changes">`;
                                for (const [key, val] of Object.entries(h.changes)) {
                                    if (skipFields.includes(key)) continue;
                                    html += `<span class="change-tag">${escapeHtml(fieldLabel(key))}: ${displayValue(val)}</span>`;
                                }
                                html += `</div>`;
                            }
                        }
                        html += `</div>`;
                    });
                }
                html += `</div>`;

                document.getElementById('content').innerHTML = html;
            } catch (e) {
                document.getElementById('content').innerHTML =
                    `<div class="error">Ошибка загрузки: ${escapeHtml(e.message)}</div>`;
            } finally {
                hideLoading();
            }
        }

        loadTicket();

        // ─── Глобальное состояние lightbox ───────────────────────────
        let lbImages = [];
        let lbCurrentIndex = 0;
        let lbZoomed = false;
        let lbScale = 1;
        let lbPosX = 0, lbPosY = 0;
        let lbIsDragging = false;
        let lbDragStartX, lbDragStartY;

        // ─── Drag & Drop ────────────────────────────────────────────
        function setupDragDrop() {
            const area = document.getElementById('uploadArea');
            if (!area) return;

            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                area.classList.add('drag-over');
            });

            area.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                area.classList.remove('drag-over');
            });

            area.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                area.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFiles(files);
                }
            });
        }

        // ─── Обработка выбранных файлов ─────────────────────────────
        function handleFiles(files) {
            if (!files || files.length === 0) return;

            const firstFile = files[0];
            if (firstFile.type.startsWith('image/')) {
                showInstantPreview(firstFile, files);
            } else {
                doUploadFiles(files);
            }
        }

        // ─── Мгновенное превью перед загрузкой ──────────────────────
        function showInstantPreview(file, allFiles) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const overlay = document.createElement('div');
                overlay.className = 'preview-overlay';
                overlay.innerHTML = `
                    <div class="preview-card">
                        <img src="${e.target.result}" alt="Preview">
                        <div style="font-size:var(--font-size-base);color:var(--color-text);">
                            <strong>${escapeHtml(file.name)}</strong><br>
                            <span style="color:var(--color-text-secondary);font-size:var(--font-size-sm);">${(file.size / 1024).toFixed(1)} КБ</span>
                        </div>
                        <div class="preview-actions">
                            <button class="btn btn-ghost">Отмена</button>
                            <button class="btn btn-primary">Загрузить (${allFiles.length})</button>
                        </div>
                    </div>
                `;
                overlay._files = allFiles;
                const btn = overlay.querySelector('.btn-primary');
                btn.onclick = function() {
                    overlay.remove();
                    doUploadFiles(overlay._files);
                };
                overlay.querySelector('.btn-ghost').onclick = () => overlay.remove();
                document.body.appendChild(overlay);
            };
            reader.readAsDataURL(file);
        }

        // ─── Загрузка файлов на сервер ──────────────────────────────
        async function doUploadFiles(files) {
            if (!files || files.length === 0) return;
            const progress = document.getElementById('uploadProgress');
            if (!progress) return;

            const formData = new FormData();
            for (const file of files) {
                formData.append('files', file);
            }

            progress.className = 'upload-progress';
            progress.textContent = '⏳ Загрузка...';

            try {
                const result = await fetchJSON(`/api/tickets/${ticketNumber}/images`, {
                    method: 'POST',
                    body: formData
                });

                if (result.error) {
                    progress.className = 'upload-progress error';
                    progress.textContent = `❌ ${result.error}`;
                    showToast('Ошибка загрузки: ' + result.error, 'error');
                    return;
                }

                let msg = '';
                if (result.uploaded && result.uploaded.length > 0) {
                    msg += `Загружено: ${result.uploaded.length}`;
                }
                if (result.errors && result.errors.length > 0) {
                    msg += ` ⚠️ Ошибок: ${result.errors.length}`;
                    console.warn('Upload errors:', result.errors);
                    if (result.errors[0]) {
                        msg += ` (${result.errors[0].error})`;
                    }
                }

                const isError = result.errors && result.errors.length > 0 && (!result.uploaded || result.uploaded.length === 0);
                progress.className = isError ? 'upload-progress error' : 'upload-progress success';
                progress.textContent = msg || 'Не удалось загрузить файлы';

                if (!isError) {
                    showToast(`Загружено ${result.uploaded.length} файлов`, 'success');
                }

                setTimeout(() => loadTicket(), 500);
            } catch (e) {
                progress.className = 'upload-progress error';
                progress.textContent = `Ошибка: ${e.message}`;
                showToast('Ошибка загрузки: ' + e.message, 'error');
            }
        }

        // ─── Удаление файла (защищено PermissionGuard) ──────────────
        async function _deleteImage(imageId) {
            const confirmed = await showModal('Удаление файла', 'Удалить этот файл?');
            if (!confirmed) return;
            try {
                const result = await fetchJSON(`/api/images/${imageId}`, { method: 'DELETE' });
                if (result.status === 'ok') {
                    showToast('Файл удалён', 'success');
                    loadTicket();
                } else {
                    showToast('Ошибка удаления: ' + (result.error || 'неизвестная ошибка'), 'error');
                }
            } catch (e) {
                showToast('Ошибка удаления: ' + e.message, 'error');
            }
        }
        const deleteImage = PermissionGuard.protectFunction(_deleteImage, 'delete_images');

        // ─── Комментарии ────────────────────────────────────────────
        async function _submitComment() {
            const input = document.getElementById('commentInput');
            const errorEl = document.getElementById('commentError');
            const text = input ? input.value.trim() : '';

            if (!text) {
                if (errorEl) errorEl.textContent = 'Введите текст комментария';
                return;
            }

            if (text.length > 5000) {
                if (errorEl) errorEl.textContent = 'Комментарий слишком длинный (максимум 5000 символов)';
                return;
            }

            if (errorEl) errorEl.textContent = '';

            try {
                const result = await fetchJSON(`/api/tickets/${ticketNumber}/comments`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({comment_text: text})
                });

                if (result.error) {
                    if (errorEl) errorEl.textContent = 'Ошибка: ' + result.error;
                    showToast('Ошибка: ' + result.error, 'error');
                    return;
                }

                showToast('✓ Комментарий добавлен', 'success');
                if (input) input.value = '';
                const counter = document.getElementById('commentCharCount');
                if (counter) counter.textContent = '0';
                loadTicket();
            } catch (e) {
                if (errorEl) errorEl.textContent = 'Ошибка: ' + e.message;
                showToast('Ошибка: ' + e.message, 'error');
            }
        }
        const submitComment = PermissionGuard.protectFunction(_submitComment, 'add_comments');

        // Счётчик символов для поля комментария
        document.addEventListener('input', function(e) {
            if (e.target && e.target.id === 'commentInput') {
                const counter = document.getElementById('commentCharCount');
                if (counter) {
                    counter.textContent = e.target.value.length;
                }
            }
        });

        // ─── Lightbox ───────────────────────────────────────────────
        function openLightbox(index) {
            lbImages = (data?.images || []).map(file => {
                const filename = file.original_filename || 'file';
                const mime = file.mime_type || '';
                const ext = filename.includes('.') ? '.' + filename.split('.').pop().toLowerCase() : '';
                return {
                    id: file.id,
                    src: file.download_url || `/api/images/${file.id}/download`,
                    previewSrc: file.thumbnail_url || file.download_url || `/api/images/${file.id}/download`,
                    alt: filename,
                    mime,
                    ext,
                    isImage: mime.startsWith('image/'),
                    isPdf: mime === 'application/pdf' || ext === '.pdf',
                    downloadUrl: file.download_url || `/api/images/${file.id}/download`
                };
            });

            if (lbImages.length === 0) return;

            lbCurrentIndex = Math.min(index, lbImages.length - 1);
            lbZoomed = false;
            lbScale = 1;
            lbPosX = 0;
            lbPosY = 0;
            renderLightbox();
        }

        function renderLightbox() {
            const old = document.querySelector('.lightbox');
            if (old) old.remove();

            const img = lbImages[lbCurrentIndex];
            if (!img) return;

            const lb = document.createElement('div');
            lb.className = 'lightbox';
            lb.onclick = (e) => {
                if (e.target === lb) closeLightbox();
            };
            const safeAlt = escapeHtml(img.alt || 'Файл');
            const safeSrc = escapeHtml(img.src || '');
            const safeDownloadUrl = escapeHtml(img.downloadUrl || '');
            const contentHtml = img.isPdf ? `
                    <iframe src="${safeSrc}" title="${safeAlt}" class="lb-pdf" loading="lazy"></iframe>
                ` : img.isImage ? `
                    <img src="${safeSrc}" alt="${safeAlt}" id="lbImage"
                        onerror="showLightboxFileError()"
                        ondblclick="toggleZoom()"
                        onwheel="handleZoom(event)"
                        onmousedown="startDrag(event)"
                        onmousemove="doDrag(event)"
                        onmouseup="endDrag()"
                        ontouchstart="startTouchZoom(event)"
                        ontouchmove="doTouchZoom(event)"
                        ontouchend="endTouchZoom()">
                ` : `
                    <div class="lb-file-placeholder">
                        <div class="lb-file-icon">📄</div>
                        <div class="lb-file-name">${safeAlt}</div>
                        <a href="${safeDownloadUrl}" target="_blank" rel="noopener" class="lb-file-link">Открыть файл</a>
                    </div>
                `;

            lb.innerHTML = `
                <button class="lb-close" onclick="closeLightbox()">❌</button>
                ${lbImages.length > 1 ? `<button class="lb-nav lb-prev" onclick="navigateLightbox(-1)">❮</button>
                <button class="lb-nav lb-next" onclick="navigateLightbox(1)">❯</button>` : ''}
                <div class="lb-content" id="lbContent">
                    ${contentHtml}
                </div>
                <div class="lb-counter">${lbCurrentIndex + 1} / ${lbImages.length}</div>
                <div class="lb-toolbar">
                    ${img.isImage ? `<button onclick="toggleZoom()">🔍 ${lbZoomed ? 'Сбросить' : 'Увеличить'}</button>` : ''}
                    ${img.isPdf ? `<button onclick="openCurrentFile()">↗ Открыть PDF</button>` : ''}
                    <button onclick="downloadCurrent()">⬇ Скачать</button>
                    <button onclick="toggleFullscreen()">⛶ На весь экран</button>
                </div>
            `;

            document.body.appendChild(lb);
            document.removeEventListener('keydown', lbKeyHandler);
            document.addEventListener('keydown', lbKeyHandler);
        }

        function showLightboxFileError() {
            const content = document.getElementById('lbContent');
            if (!content) return;
            const img = lbImages[lbCurrentIndex];
            const filename = escapeHtml(img?.alt || 'Файл');
            content.innerHTML = `
                <div class="lb-file-placeholder">
                    <div class="lb-file-icon">⚠</div>
                    <div class="lb-file-name">${filename}</div>
                    <div style="color: var(--color-text-secondary); margin-bottom: var(--space-4);">
                        Файл не найден на диске или недоступен для просмотра.
                    </div>
                    ${img?.downloadUrl ? `<a href="${escapeHtml(img.downloadUrl)}" target="_blank" rel="noopener" class="lb-file-link">Попробовать открыть напрямую</a>` : ''}
                </div>
            `;
        }

        function lbKeyHandler(e) {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
            if (e.key === '+' || e.key === '=') toggleZoom();
            if (e.key === '-') { if (lbZoomed) toggleZoom(); }
        }

        function navigateLightbox(direction) {
            lbCurrentIndex = (lbCurrentIndex + direction + lbImages.length) % lbImages.length;
            lbZoomed = false;
            lbScale = 1;
            lbPosX = 0;
            lbPosY = 0;
            renderLightbox();
        }

        function toggleZoom() {
            const img = document.getElementById('lbImage');
            if (!img) return;
            lbZoomed = !lbZoomed;
            if (lbZoomed) {
                lbScale = 2;
                img.style.transform = `scale(${lbScale}) translate(${lbPosX}px, ${lbPosY}px)`;
                img.classList.add('zoomed');
            } else {
                lbScale = 1;
                lbPosX = 0;
                lbPosY = 0;
                img.style.transform = '';
                img.classList.remove('zoomed');
            }
        }

        function handleZoom(event) {
            if (!lbZoomed) return;
            event.preventDefault();
            const img = document.getElementById('lbImage');
            if (!img) return;

            const delta = event.deltaY > 0 ? -0.1 : 0.1;
            lbScale = Math.max(1, Math.min(5, lbScale + delta));
            img.style.transform = `scale(${lbScale}) translate(${lbPosX}px, ${lbPosY}px)`;
        }

        function startDrag(event) {
            if (!lbZoomed) return;
            lbIsDragging = true;
            lbDragStartX = event.clientX - lbPosX;
            lbDragStartY = event.clientY - lbPosY;
        }

        function doDrag(event) {
            if (!lbIsDragging || !lbZoomed) return;
            lbPosX = event.clientX - lbDragStartX;
            lbPosY = event.clientY - lbDragStartY;
            const img = document.getElementById('lbImage');
            if (img) {
                img.style.transform = `scale(${lbScale}) translate(${lbPosX}px, ${lbPosY}px)`;
            }
        }

        function endDrag() {
            lbIsDragging = false;
        }

        let touchStartDistance = 0;
        let touchStartScale = 1;

        function startTouchZoom(event) {
            if (event.touches.length === 2) {
                touchStartDistance = Math.hypot(
                    event.touches[0].clientX - event.touches[1].clientX,
                    event.touches[0].clientY - event.touches[1].clientY
                );
                touchStartScale = lbScale;
            }
        }

        function doTouchZoom(event) {
            if (event.touches.length === 2) {
                event.preventDefault();
                const dist = Math.hypot(
                    event.touches[0].clientX - event.touches[1].clientX,
                    event.touches[0].clientY - event.touches[1].clientY
                );
                lbScale = Math.max(1, Math.min(5, touchStartScale * (dist / touchStartDistance)));
                const img = document.getElementById('lbImage');
                if (img) {
                    lbZoomed = lbScale > 1;
                    img.style.transform = `scale(${lbScale}) translate(${lbPosX}px, ${lbPosY}px)`;
                    if (lbZoomed) img.classList.add('zoomed');
                    else img.classList.remove('zoomed');
                }
            }
        }

        function endTouchZoom() {}

        function downloadCurrent() {
            const img = lbImages[lbCurrentIndex];
            if (!img) return;
            const a = document.createElement('a');
            a.href = img.downloadUrl || img.src;
            a.download = img.alt || 'file';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function openCurrentFile() {
            const img = lbImages[lbCurrentIndex];
            if (!img) return;
            window.open(img.src, '_blank', 'noopener');
        }

        function toggleFullscreen() {
            const lb = document.querySelector('.lightbox');
            if (!lb) return;
            if (!document.fullscreenElement) {
                lb.requestFullscreen?.() || lb.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
        }

        function closeLightbox() {
            const lb = document.querySelector('.lightbox');
            if (lb) lb.remove();
            document.removeEventListener('keydown', lbKeyHandler);
            lbImages = [];
        }

        // ─── Инициализация drag-and-drop и permission UI после загрузки ─
        const origLoadTicket = loadTicket;
        loadTicket = async function() {
            await origLoadTicket.call(this);
            setTimeout(setupDragDrop, 100);
            // PermissionGuard.apply() обработает динамически добавленные элементы
            setTimeout(() => {
                if (typeof PermissionGuard !== 'undefined') {
                    PermissionGuard.apply();
                } else {
                    applyPermissionUI();
                }
            }, 150);
        };
    </script>
</body>
</html>
