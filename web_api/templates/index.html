<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГКУ ОП Заявки</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        /* Минимальные специфичные стили только для index.html */
    </style>
</head>
<body>
    <!-- Оверлей авторизации -->
    <div class="auth-overlay" id="authOverlay">
        <form class="auth-form" id="authForm" onsubmit="return handleLogin(event)">
            <input type="text" class="auth-input" id="authLogin" placeholder="Логин" autocomplete="off" />
            <input type="password" class="auth-input" id="authPassword" placeholder="Пароль" autocomplete="off" />
            <button type="submit" class="auth-btn">Войти</button>
            <div class="auth-error" id="authError"></div>
        </form>
    </div>

    <div class="header">
        <h1>ГКУ ОП <span>Заявки</span></h1>
        <div id="authIndicator" class="header-actions" style="display:none">
            <span class="auth-indicator"></span>
            <button class="btn btn-rebuild" onclick="rebuildDatabase()" id="rebuildBtn">⟳ Обновить данные</button>
            <button class="btn btn-logout" onclick="handleLogout()">Выйти</button>
        </div>
    </div>

    <div class="container">
        <!-- Контейнер для тостов -->
        <div class="toast-container" id="toastContainer"></div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="tabs">
            <button class="tab-btn active" id="tabActive" onclick="switchTab('active')">
                <span class="tab-icon">📃</span><span class="tab-label">Активные</span> <span class="count" id="countActive">—</span>
            </button>
            <button class="tab-btn" id="tabTasks" onclick="switchTab('tasks')">
                <span class="tab-icon">📑</span><span class="tab-label">Задачи</span> <span class="count" id="countTasks">—</span>
            </button>
            <button class="tab-btn" id="tabArchived" onclick="switchTab('archived')">
                <span class="tab-icon">🗃️</span><span class="tab-label">Архив</span> <span class="count" id="countArchived">—</span>
            </button>
        </div>

        <div class="filters">
            <div class="search-wrap">
                <input type="text" class="input" id="searchInput"
                    placeholder="Поиск: № заявки, инв. номер (в т.ч. по последним цифрам), тема, автор, устройство..." />
                <button class="search-btn" onclick="onSearchNow()" title="Найти">🔍</button>
            </div>
        </div>

        <div id="searchResultsInfo" class="search-results-info" style="display:none; margin-bottom:8px; font-size:0.9em; color:#666;"></div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortBy('ticket_number')">№ заявки <span class="arrow" id="arr-ticket_number"></span></th>
                        <th onclick="sortBy('status')">Статус <span class="arrow" id="arr-status"></span></th>
                        <th onclick="sortBy('inventory_number')">Инв. номер <span class="arrow" id="arr-inventory_number"></span></th>
                        <th>Кабинет</th>
                        <th onclick="sortBy('last_updated_date')">Обновлено <span class="arrow" id="arr-last_updated_date"></span></th>
                    </tr>
                </thead>
                <tbody id="ticketsBody">
                    <tr><td colspan="5" class="loading">Загрузка...</td></tr>
                </tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        // ─── Аутентификация ───────────────────────────────────
        const AUTH_KEY = 'gkuop_auth';

        // Безопасный fetch с проверкой response.ok и диагностикой ошибок JSON
        async function fetchJSON(url, options = {}) {
            const r = await fetch(url, options);
            if (!r.ok) {
                const text = await r.text();
                const preview = text.slice(0, 200);
                throw new Error(`HTTP ${r.status}: ${preview}`);
            }
            return r.json();
        }

        function getAuth() {
            try {
                const raw = sessionStorage.getItem(AUTH_KEY);
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (Date.now() - data.timestamp > 24 * 60 * 60 * 1000) {
                    sessionStorage.removeItem(AUTH_KEY);
                    return null;
                }
                return data;
            } catch (e) {
                return null;
            }
        }

        function setAuth(username) {
            sessionStorage.setItem(AUTH_KEY, JSON.stringify({
                username: username,
                timestamp: Date.now()
            }));
        }

        function clearAuth() {
            sessionStorage.removeItem(AUTH_KEY);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const login = document.getElementById('authLogin').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const errorEl = document.getElementById('authError');

            try {
                const data = await fetchJSON('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({login, password})
                });
                if (data.status === 'ok') {
                    setAuth(data.username);
                    showApp();
                    errorEl.textContent = '';
                } else {
                    errorEl.textContent = data.message || 'Неверный логин или пароль';
                }
            } catch (e) {
                errorEl.textContent = 'Ошибка соединения с сервером';
            }
            return false;
        }

        function handleLogout() {
            clearAuth();
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('authIndicator').style.display = 'none';
            document.getElementById('authLogin').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authError').textContent = '';
        }

        function showApp() {
            document.getElementById('authOverlay').style.display = 'none';
            const indicator = document.getElementById('authIndicator');
            const auth = getAuth();
            if (auth) {
                indicator.style.display = 'flex';
                indicator.querySelector('.auth-indicator').textContent = auth.username;
            }
        }

        // ─── Состояние списка ───────────────────────────────
        const LIST_STATE_KEY = 'gkuop_list_state';

        function saveListState() {
            const state = {
                page: currentPage,
                sort: currentSort,
                order: currentOrder,
                tab: currentTab,
                search: document.getElementById('searchInput').value,
                scrollY: window.scrollY,
                timestamp: Date.now()
            };
            try {
                sessionStorage.setItem(LIST_STATE_KEY, JSON.stringify(state));
            } catch (e) { /* ignore */ }
        }

        function restoreListState() {
            try {
                const raw = sessionStorage.getItem(LIST_STATE_KEY);
                if (!raw) return null;
                const state = JSON.parse(raw);
                // Проверяем, что состояние не старше 5 минут
                if (Date.now() - state.timestamp > 5 * 60 * 1000) {
                    sessionStorage.removeItem(LIST_STATE_KEY);
                    return null;
                }
                return state;
            } catch (e) {
                return null;
            }
        }

        function applyListState(state) {
            if (!state) return;
            currentPage = state.page || 1;
            currentSort = state.sort || 'last_updated_date';
            currentOrder = state.order || 'desc';
            currentTab = state.tab || 'active';
            if (state.search) document.getElementById('searchInput').value = state.search;

            // Восстанавливаем активный таб
            document.getElementById('tabActive').classList.toggle('active', currentTab === 'active');
            document.getElementById('tabTasks').classList.toggle('active', currentTab === 'tasks');
            document.getElementById('tabArchived').classList.toggle('active', currentTab === 'archived');

            // Восстанавливаем стрелки сортировки
            document.querySelectorAll('th .arrow').forEach(a => a.textContent = '');
            const arrow = document.getElementById('arr-' + currentSort);
            if (arrow) arrow.textContent = currentOrder === 'asc' ? '▲' : '▼';

            // Загружаем тикеты и после загрузки восстанавливаем прокрутку
            loadTickets().then(() => {
                if (state.scrollY > 0) {
                    requestAnimationFrame(() => {
                        window.scrollTo(0, state.scrollY);
                    });
                }
            });

            // Очищаем сохранённое состояние после применения
            sessionStorage.removeItem(LIST_STATE_KEY);
        }

        let currentPage = 1;
        let currentSort = 'last_updated_date';
        let currentOrder = 'desc';
        let currentTab = 'active';
        let taskNumbers = [];  // Номера заявок, находящихся в задачах

        // ─── Toast-уведомления ──────────────────────────────
        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toastContainer');
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
                <span class="toast-msg">${message}</span>
                <button class="toast-close" onclick="this.closest('.toast').classList.add('removing');setTimeout(()=>this.closest('.toast').remove(),300)">✕</button>
            `;
            container.appendChild(toast);
            if (duration > 0) {
                setTimeout(() => {
                    toast.classList.add('removing');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }
        }

        // ─── Модальное окно ─────────────────────────────────
        function showModal(title, message, confirmText = 'Да', cancelText = 'Отмена') {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal">
                        <h3>${title}</h3>
                        <p>${message}</p>
                        <div class="modal-actions">
                            <button class="btn-cancel">${cancelText}</button>
                            <button class="btn-confirm">${confirmText}</button>
                        </div>
                    </div>
                `;
                overlay.querySelector('.btn-cancel').onclick = () => {
                    overlay.remove();
                    resolve(false);
                };
                overlay.querySelector('.btn-confirm').onclick = () => {
                    overlay.remove();
                    resolve(true);
                };
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.remove();
                        resolve(false);
                    }
                });
                document.body.appendChild(overlay);
            });
        }

        async function loadTabCounts() {
            try {
                const [stats, tasksData] = await Promise.all([
                    fetchJSON('/api/statistics'),
                    fetchJSON('/api/tasks')
                ]);
                document.getElementById('countActive').textContent = stats.active ?? '—';
                document.getElementById('countArchived').textContent = stats.archived ?? '—';
                document.getElementById('countTasks').textContent = tasksData.count ?? '—';
            } catch (e) {
                console.error('Stats error:', e);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            document.getElementById('tabActive').classList.toggle('active', tab === 'active');
            document.getElementById('tabTasks').classList.toggle('active', tab === 'tasks');
            document.getElementById('tabArchived').classList.toggle('active', tab === 'archived');
            loadTickets();
        }

        function statusClass(status) {
            if (!status) return 'status-default';
            const s = status.toLowerCase();
            if (s.includes('отклон') || s.includes('закрыт')) return 'status-rejected';
            if (s.includes('комплектующ')) return 'status-parts';
            if (s.includes('выполн')) return 'status-completed';
            if (s.includes('соглас') || s.includes('решен')) return 'status-approved';
            if (s.includes('работ')) return 'status-work';
            if (s.includes('нов') || s.includes('созд')) return 'status-new';
            return 'status-default';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        function formatDate(d) {
            if (!d) return '—';
            const dt = new Date(d);
            return dt.toLocaleDateString('ru-RU', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        // ─── Debounce для поиска ────────────────────────────────
        let searchDebounceTimer = null;
        const SEARCH_DEBOUNCE_MS = 400;

        function onSearchInput() {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                currentPage = 1;
                loadTickets();
            }, SEARCH_DEBOUNCE_MS);
        }

        function onSearchNow() {
            clearTimeout(searchDebounceTimer);
            currentPage = 1;
            loadTickets();
        }

        async function loadTaskNumbers() {
            try {
                const data = await fetchJSON('/api/tasks');
                taskNumbers = data.tasks || [];
            } catch (e) {
                console.error('Load tasks error:', e);
                taskNumbers = [];
            }
        }

        function isInTasks(ticketNumber) {
            return taskNumbers.includes(ticketNumber);
        }

        async function toggleTaskFromList(ticketNumber, event) {
            event.preventDefault();
            event.stopPropagation();
            try {
                if (isInTasks(ticketNumber)) {
                    await fetchJSON(`/api/tickets/${ticketNumber}/task`, { method: 'DELETE' });
                    showToast('Заявка удалена из задач', 'info');
                } else {
                    await fetchJSON(`/api/tickets/${ticketNumber}/task`, { method: 'POST' });
                    showToast('🔵 Заявка добавлена в задачи', 'success');
                }
                // Обновляем список задач и перезагружаем текущую вкладку
                await loadTaskNumbers();
                loadTickets();
                loadTabCounts();
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }
        }

        async function loadTickets() {
            const search = document.getElementById('searchInput').value;

            document.getElementById('ticketsBody').innerHTML =
                '<tr><td colspan="5" class="loading">Загрузка...</td></tr>';

            try {
                let data;

                if (currentTab === 'tasks') {
                    // Для вкладки "Задачи" используем отдельный эндпоинт
                    const params = new URLSearchParams({
                        page: currentPage,
                        per_page: 50,
                        sort_by: currentSort,
                        sort_order: currentOrder,
                    });
                    data = await fetchJSON('/api/tasks/tickets?' + params.toString());
                } else {
                    // Для вкладок "Активные" и "Архив"
                    const params = new URLSearchParams({
                        page: currentPage,
                        per_page: 50,
                        sort_by: currentSort,
                        sort_order: currentOrder,
                        archived: currentTab === 'archived' ? '1' : '0',
                    });
                    if (search) params.set('search', search);
                    data = await fetchJSON('/api/tickets?' + params.toString());
                }

                if (data.error) {
                    showError(data.error);
                    return;
                }

                // Загружаем список задач для отображения 🔵 во вкладке "Активные"
                if (currentTab === 'active') {
                    await loadTaskNumbers();
                }

                const tbody = document.getElementById('ticketsBody');
                const resultsInfo = document.getElementById('searchResultsInfo');

                if (data.tickets.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty">Заявки не найдены</td></tr>';
                    if (resultsInfo) resultsInfo.style.display = 'none';
                } else {
                    tbody.innerHTML = data.tickets.map((t, idx) => {
                        const inTasks = isInTasks(t.ticket_number);
                        const taskBtn = (currentTab === 'active')
                            ? `<button class="task-toggle-btn ${inTasks ? 'active' : ''}" onclick="toggleTaskFromList('${t.ticket_number}', event)" title="${inTasks ? 'Удалить из задач' : 'Добавить в задачи'}">${inTasks ? '🔵' : '⚪'}</button> `
                            : '';
                        return `<tr style="animation-delay:${Math.min(idx * 0.03, 0.3)}s">
                            <td data-label="№ заявки">${taskBtn}<a href="/tickets/${t.ticket_number}" class="ticket-link" onclick="saveListState()">#${t.ticket_number}${t.has_files ? '<span class="paperclip-icon">📎</span>' : ''}</a></td>
                            <td data-label="Статус"><span class="status-badge ${statusClass(t.status)}">${t.status || '—'}</span></td>
                            <td data-label="Инв. номер">${t.inventory_number || '—'}</td>
                            <td data-label="Кабинет">${t.cabinet ? t.office + ' / ' + t.cabinet : (t.office || '—')}</td>
                            <td data-label="Обновлено">${formatDate(t.last_updated_date)}</td>
                        </tr>`;
                    }).join('');

                    // Отображаем количество найденных заявок
                    if (resultsInfo) {
                        const searchVal = document.getElementById('searchInput').value.trim();
                        let label = `Найдено заявок: <strong>${data.total}</strong>`;
                        if (searchVal) label += ` (поиск: «${escapeHtml(searchVal)}»)`;
                        resultsInfo.innerHTML = label;
                        resultsInfo.style.display = 'block';
                    }
                }

                renderPagination(data);
                hideError();
            } catch (e) {
                showError('Ошибка загрузки: ' + e.message);
            }
        }

        function renderPagination(data) {
            const el = document.getElementById('pagination');
            if (data.total_pages <= 1) {
                el.innerHTML = '';
                return;
            }
            let html = '';
            html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹</button>`;
            for (let p = 1; p <= data.total_pages; p++) {
                if (p === 1 || p === data.total_pages || Math.abs(p - currentPage) <= 2) {
                    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
                } else if (!html.endsWith('<span class="page-ellipsis">…</span>')) {
                    html += '<span class="page-ellipsis">…</span>';
                }
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= data.total_pages ? 'disabled' : ''}>›</button>`;
            el.innerHTML = html;
        }

        function goPage(p) {
            currentPage = p;
            loadTickets();
            // Плавный скролл к таблице
            document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function sortBy(field) {
            if (currentSort === field) {
                currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort = field;
                currentOrder = 'desc';
            }
            document.querySelectorAll('th .arrow').forEach(a => a.textContent = '');
            const arrow = document.getElementById('arr-' + field);
            if (arrow) arrow.textContent = currentOrder === 'asc' ? '▲' : '▼';
            currentPage = 1;
            loadTickets();
        }

        async function rebuildDatabase() {
            const confirmed = await showModal(
                'Обновление данных',
                'Обработать новые письма из почты? Это может занять некоторое время.'
            );
            if (!confirmed) return;

            const btn = document.getElementById('rebuildBtn');
            btn.disabled = true;
            btn.textContent = '⟳ Обновление...';
            showError('');

            try {
                const data = await fetchJSON('/api/rebuild', { method: 'POST' });

                if (data.error) {
                    showError('Ошибка: ' + data.error);
                    showToast('Ошибка обновления: ' + data.error, 'error');
                } else {
                    showToast('✓ Данные успешно обновлены', 'success');
                    document.getElementById('errorMsg').style.display = 'none';
                    loadTabCounts();
                    loadTickets();
                }
            } catch (e) {
                showError('Ошибка соединения: ' + e.message);
                showToast('Ошибка соединения: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '⟳ Обновить данные';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        // Поиск с debounce при вводе
        document.getElementById('searchInput').addEventListener('input', onSearchInput);

        // Enter для поиска (сбрасывает debounce и выполняет сразу)
        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                clearTimeout(searchDebounceTimer);
                currentPage = 1;
                loadTickets();
            }
        });

        // Инициализация
        // Проверяем авторизацию
        const auth = getAuth();
        if (auth) {
            showApp();
        }

        loadTabCounts();

        // Пытаемся восстановить состояние списка при возврате с детальной страницы
        const savedState = restoreListState();
        if (savedState) {
            applyListState(savedState);
        } else {
            loadTickets();
        }

        // Слушаем изменения localStorage из других вкладок/окон (например, при выполнении заявки)
        window.addEventListener('storage', function(e) {
            if (e.key === 'gkuop_task_update') {
                loadTaskNumbers().then(() => {
                    loadTickets();
                    loadTabCounts();
                });
            }
        });

        // При возврате на страницу через history.back (bfcache) — перезагружаем задачи
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) {
                // Страница восстановлена из bfcache — обновляем данные
                loadTaskNumbers().then(() => {
                    loadTickets();
                    loadTabCounts();
                });
            }
        });
    </script>
</body>
</html>
